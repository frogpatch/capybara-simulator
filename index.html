<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Capybara Simulator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; touch-action: none; font-family: 'Quicksand', sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #loading {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: #1a3a1a; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100;
            font-family: 'Quicksand', sans-serif; color: #a8d5a2;
        }
        #loading .title { font-size: 28px; margin-bottom: 20px; letter-spacing: 2px; font-weight: 300; }
        #loading .bar { width: 200px; height: 6px; background: #0a1a0a; border-radius: 3px; overflow: hidden; }
        #loading .fill { height: 100%; background: #6abf69; width: 0%; transition: width 0.3s; }
        #loading .sub { font-size: 12px; margin-top: 10px; opacity: 0.6; }

        #hud {
            position: fixed; top: 60px; left: 0; right: 0;
            pointer-events: none; z-index: 50;
            padding: 10px 16px;
            display: flex; justify-content: space-between; align-items: flex-start;
        }
        @media (max-width: 600px) {
            #hud { top: 50px; padding: 6px 10px; }
            #points { font-size: 12px; padding: 3px 10px; }
            #points span { font-size: 14px; }
            #music-controls { gap: 5px; }
            #music-controls button { width: 30px; height: 30px; }
            #music-controls button svg { width: 14px; height: 14px; }
        }
        #points {
            font-size: 15px; font-weight: 300; letter-spacing: 1.5px;
            color: rgba(255,255,255,0.75);
            text-shadow: 0 1px 4px rgba(0,0,0,0.3);
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 5px 14px;
            backdrop-filter: blur(8px);
        }
        #points span { font-weight: 500; font-size: 17px; }
        #music-controls {
            pointer-events: all;
            display: flex; gap: 8px; align-items: center;
        }
        #music-controls button {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.7);
            border-radius: 50%;
            width: 36px; height: 36px;
            padding: 0;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(8px);
            transition: all 0.2s;
        }
        #music-controls button:hover {
            background: rgba(255,255,255,0.25);
            color: rgba(255,255,255,0.9);
        }
        #music-controls button svg {
            width: 18px; height: 18px;
            stroke: currentColor; fill: none;
            stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
        }
        #btn-rain.active { background: rgba(255,255,255,0.3); color: rgba(255,255,255,0.95); }
    </style>
    <script src="https://sdk.play.fun/latest"></script>
    <script src="https://cdn.socket.io/4.8.0/socket.io.min.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="zdbg" style="position:fixed;bottom:60px;left:10px;color:#0f0;font-family:monospace;font-size:14px;font-weight:bold;z-index:99;pointer-events:none;text-shadow:0 0 4px #000;white-space:pre;background:rgba(0,0,0,0.5);padding:6px 10px;border-radius:6px"></div>
    <div id="hud" style="display:none;">
        <div id="points"><span id="score">0</span> vibes</div>
        <div id="music-controls">
            <button id="btn-skip" title="Skip track"><svg viewBox="0 0 24 24"><polygon points="5,4 15,12 5,20"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
            <button id="btn-mute" title="Mute/Unmute"><svg viewBox="0 0 24 24"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/><path d="M15.54 8.46a5 5 0 010 7.07"/><path d="M19.07 4.93a10 10 0 010 14.14"/></svg></button>
            <button id="btn-rain" title="Toggle rain"><svg viewBox="0 0 24 24"><path d="M20 17.58A5 5 0 0018 8h-1.26A8 8 0 104 16.25"/><line x1="8" y1="16" x2="8" y2="20"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="16" y1="16" x2="16" y2="20"/></svg></button>
        </div>
    </div>
    <div id="loading">
        <div class="title">Capybara Simulator</div>
        <div class="bar"><div class="fill" id="loadBar"></div></div>
        <div class="sub" id="loadText">loading...</div>
    </div>
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { frameCorners } from 'three/addons/utils/CameraUtils.js';
        import { ReactionSystem } from './js/reaction-system.js';
        import { PropManager } from './js/prop-manager.js';

        const _isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || navigator.maxTouchPoints > 1;
        const _reactionsEnabled = new URLSearchParams(window.location.search).get('reactions') !== 'off';

        // === RENDERER ===
        const renderer = new THREE.WebGLRenderer({ antialias: !_isMobile });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, _isMobile ? 1.5 : 2));
        renderer.shadowMap.enabled = true;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        document.body.appendChild(renderer.domElement);

        // === SCENE ===
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x9ac8e8);
        scene.fog = new THREE.Fog(0x9ac8e8, 20, 70);

        // === CAMERA ===
        // Camera looks straight at the capybara from the front
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 500);

        // === LIGHTING ===
        const hemiLight = new THREE.HemisphereLight(0xd4e8f0, 0x3a5f2a, 0.8);
        scene.add(hemiLight);
        const sun = new THREE.DirectionalLight(0xfff4d6, 1.2);
        sun.position.set(2, 8, 10);
        sun.castShadow = true;
        sun.shadow.mapSize.width = 2048;
        sun.shadow.mapSize.height = 2048;
        sun.shadow.bias = -0.001;
        sun.shadow.camera.near = 0.5;
        sun.shadow.camera.far = 30;
        sun.shadow.camera.left = -6;
        sun.shadow.camera.right = 6;
        sun.shadow.camera.top = 6;
        sun.shadow.camera.bottom = -6;
        scene.add(sun);
        const ambientLight = new THREE.AmbientLight(0x607060, 0.4);
        scene.add(ambientLight);

        // === ROOM DIMENSIONS (used for off-axis projection screen rectangle) ===
        // No box walls — open landscape. roomW/roomH define the screen opening.
        // Room adapts to screen aspect ratio
        // From the camera's FOV and distance, compute how big the room opening
        // needs to be to fill the viewport, then size the room to match
        const fovRad = camera.fov * Math.PI / 180;
        const aspect = window.innerWidth / window.innerHeight;
        const camDist = 6.5; // distance from camera to room opening
        const roomH = 2 * camDist * Math.tan(fovRad / 2);
        const roomW = roomH * aspect;
        const roomD = 7;     // depth (front to back)
        const roomZ = -2;    // back wall z position

        // Camera at exact center of room opening
        const camZ = roomZ + roomD + camDist;
        const camY = roomH / 2;
        camera.position.set(0, camY, camZ);
        camera.lookAt(0, camY, roomZ); // look straight at back wall center

        // === OPEN LANDSCAPE ===

        // Huge ground plane with vertex color variation
        const groundSize = 160;
        const groundGeo = new THREE.PlaneGeometry(groundSize, groundSize, 64, 64);
        const gColors = new Float32Array(groundGeo.attributes.position.count * 3);
        const gBase = new THREE.Color(0x3a7a2a);
        const gDark = new THREE.Color(0x2a5a1a);
        const gLight = new THREE.Color(0x4a9a3a);
        for (let i = 0; i < groundGeo.attributes.position.count; i++) {
            const t = Math.random();
            const c = t < 0.33 ? gBase : t < 0.66 ? gDark : gLight;
            gColors[i*3] = c.r; gColors[i*3+1] = c.g; gColors[i*3+2] = c.b;
        }
        groundGeo.setAttribute('color', new THREE.BufferAttribute(gColors, 3));
        const ground = new THREE.Mesh(groundGeo, new THREE.MeshLambertMaterial({ vertexColors: true }));
        ground.rotation.x = -Math.PI / 2;
        ground.position.set(0, -0.02, roomZ + roomD / 2);
        ground.receiveShadow = true;
        scene.add(ground);

        // Capybara platform rectangle (the original floor, kept as parallax reference)
        const floorMat = new THREE.MeshLambertMaterial({ color: 0x2d6b1e });
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(roomW, roomD), floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.position.set(0, 0, roomZ + roomD / 2);
        floor.receiveShadow = true;
        scene.add(floor);

        // Rolling hills at different depths for parallax
        function addHill(x, z, radius, height, color) {
            const geo = new THREE.SphereGeometry(radius, 16, 12, 0, Math.PI * 2, 0, Math.PI / 2);
            const hill = new THREE.Mesh(geo, new THREE.MeshLambertMaterial({ color }));
            hill.position.set(x, -radius * 0.15, z);
            hill.scale.y = height / radius;
            scene.add(hill);
        }
        addHill(-6, roomZ - 3, 5, 1.8, 0x3a7a2a);
        addHill(7, roomZ - 2, 4, 1.5, 0x358025);
        addHill(-3, roomZ - 6, 6, 2.2, 0x2d6b1e);
        addHill(0, roomZ - 18, 15, 4, 0x2a5a1a);
        addHill(-14, roomZ - 15, 12, 3.5, 0x266318);
        addHill(12, roomZ - 20, 14, 3, 0x2d6b1e);
        addHill(-8, roomZ - 25, 18, 5, 0x224f15);
        addHill(15, roomZ - 28, 16, 4.5, 0x1e4512);

        // Pond
        const pond = new THREE.Mesh(
            new THREE.CircleGeometry(2.5, 32),
            new THREE.MeshLambertMaterial({ color: 0x3a8abf, transparent: true, opacity: 0.7 })
        );
        pond.rotation.x = -Math.PI / 2;
        pond.position.set(3, 0.01, roomZ - 2);
        scene.add(pond);

        // === LOADING SYSTEM ===
        const loader = new GLTFLoader();
        let capybara = null;
        let mixer = null;
        let animClips = [];
        let _animActions = {};
        let _capyHeadBone = null;
        let _headBaseRotY = 0, _headBaseRotZ = 0, _headBaseRotX = 0;
        let _boneMap = {};
        const bar = document.getElementById('loadBar');
        const loadText = document.getElementById('loadText');

        // Total models: 1 capybara + 3 decoration + 6 hats + 8 props = 18
        let loadedCount = 0;
        let totalModels = 4; // capybara + 3 decoration (will increase when hats/props start)

        function updateLoadBar() {
            bar.style.width = Math.round((loadedCount / totalModels) * 100) + '%';
        }

        // === LOAD CAPYBARA ===
        loadText.textContent = 'loading capybara...';
        const charGltf = await new Promise((resolve, reject) => {
            loader.load('models/capybara-biped-animations.glb', resolve, (p) => {
                if (p.total) bar.style.width = Math.round((p.loaded / p.total) * 50) + '%';
            }, reject);
        });
        loadedCount++;
        updateLoadBar();

        const capy = charGltf.scene;
        const box = new THREE.Box3().setFromObject(capy);
        const size = box.getSize(new THREE.Vector3());
        const scaleFactor = 1.0 / (size.y || 0.001);

        const capyGroup = new THREE.Group();
        capyGroup.add(capy);
        capy.scale.setScalar(scaleFactor);
        // Position capybara at center of room, pushed back so fully visible
        capyGroup.position.set(0, -0.05, roomZ + roomD * 0.55);

        capy.traverse(c => {
            if (c.isMesh) {
                c.castShadow = true;
                c.receiveShadow = true;
                if (c.material) {
                    c.material = c.material.clone();
                    if (c.material.emissiveMap && !c.material.map) {
                        c.material.map = c.material.emissiveMap;
                    }
                    c.material.emissive.set(0, 0, 0);
                    c.material.emissiveIntensity = 0;
                    c.material.emissiveMap = null;
                    c.material.metalness = 0;
                    c.material.roughness = 0.8;
                    c.material.needsUpdate = true;
                }
            }
        });

        scene.add(capyGroup);
        capybara = capyGroup;

        // Find head bone for hat attachment and head sway
        capy.traverse(c => {
            if (c.isBone) {
                _boneMap[c.name] = c;
                if (c.name.toLowerCase() === 'head') {
                    _capyHeadBone = c;
                    _headBaseRotY = c.rotation.y;
                    _headBaseRotZ = c.rotation.z;
                    _headBaseRotX = c.rotation.x;
                }
            }
        });
        console.log('Bones found:', Object.keys(_boneMap));

        // Setup animation (clips are in the same GLB)
        animClips = charGltf.animations;
        if (animClips.length > 0) {
            mixer = new THREE.AnimationMixer(capyGroup);
            _animActions = {};
            for (const clip of animClips) {
                _animActions[clip.name] = mixer.clipAction(clip);
            }
            const idleClip = animClips.find(a => a.name === 'Confused_Scratch');
            if (idleClip) _animActions['Confused_Scratch'].play();
            console.log('Animations:', animClips.map(a => a.name));
        }

        // === SCENE DECORATION ===
        loadText.textContent = 'decorating...';

        // Helper to load a GLB, fix materials, return scene
        async function loadModel(path) {
            const gltf = await new Promise((res, rej) => loader.load(path, res, undefined, rej));
            gltf.scene.traverse(c => {
                if (c.isMesh && c.material) {
                    c.material = c.material.clone();
                    if (c.material.emissiveMap && !c.material.map) c.material.map = c.material.emissiveMap;
                    if (c.material.emissive) c.material.emissive.set(0, 0, 0);
                    c.material.emissiveIntensity = 0;
                    c.material.emissiveMap = null;
                    c.material.needsUpdate = true;
                    c.castShadow = true;
                    c.receiveShadow = true;
                }
            });
            return gltf.scene;
        }

        // Helper to place a clone
        function placeClone(src, x, y, z, scale, rotY) {
            const c = src.clone();
            c.position.set(x, y, z);
            c.scale.setScalar(scale);
            if (rotY) c.rotation.y = rotY;
            scene.add(c);
            return c;
        }

        // Instanced flowers with GPU wind (from capybara-simulator)
        const _flowerInstancedMeshes = [];
        try {
            // Load decoration models
            const [flowerModel, rockModel, grassModel] = await Promise.all([
                loadModel('models/flower.glb'),
                loadModel('models/rock2.glb'),
                loadModel('models/grass-turf.glb'),
            ]);
            loadedCount += 3;
            updateLoadBar();

            const capyZ = roomZ + roomD * 0.55;
            const hw = roomW / 2;

            // === INSTANCED FLOWERS — 400 with GPU wind sway ===
            const FLOWER_COUNT = 400;
            const srcMeshes = [];
            flowerModel.traverse(c => { if (c.isMesh && c.material) srcMeshes.push(c); });

            if (srcMeshes.length > 0) {
                const dummy = new THREE.Object3D();
                const matrices = [];
                const windPhases = new Float32Array(FLOWER_COUNT);
                const windStrengths = new Float32Array(FLOWER_COUNT);
                let idx = 0;

                // Cluster centers spread across the landscape at different depths
                const clusters = [
                    // Near platform
                    [0, roomZ+roomD*0.5], [-hw, roomZ+1], [hw, roomZ+1],
                    // Mid field
                    [-4, roomZ-1], [4, roomZ-2], [0, roomZ-3],
                    [-6, roomZ+1], [6, roomZ],
                    // Far field
                    [-8, roomZ-8], [7, roomZ-7], [0, roomZ-12],
                    [-5, roomZ-15], [5, roomZ-18], [-10, roomZ-10],
                    [10, roomZ-12], [0, roomZ-20],
                    // Very far
                    [-12, roomZ-22], [12, roomZ-25], [0, roomZ-30],
                ];

                for (let attempt = 0; attempt < 2000 && idx < FLOWER_COUNT; attempt++) {
                    const c = clusters[Math.floor(Math.random() * clusters.length)];
                    const x = c[0] + (Math.random() - 0.5) * 10;
                    const z = c[1] + (Math.random() - 0.5) * 8;
                    // Skip if too close to capybara
                    if (Math.abs(x) < 0.8 && Math.abs(z - capyZ) < 1.0) continue;
                    const scale = 0.25 + Math.random() * 0.25;
                    dummy.position.set(x, 0, z);
                    dummy.rotation.set(0, Math.random() * Math.PI * 2, 0);
                    dummy.scale.setScalar(scale);
                    dummy.updateMatrix();
                    matrices.push(dummy.matrix.clone());
                    windPhases[idx] = Math.random() * Math.PI * 2;
                    windStrengths[idx] = 0.06 + Math.random() * 0.05;
                    idx++;
                }

                const wpSlice = windPhases.slice(0, idx);
                const wsSlice = windStrengths.slice(0, idx);

                for (const srcMesh of srcMeshes) {
                    const geo = srcMesh.geometry.clone();
                    const localMat = new THREE.Matrix4().compose(srcMesh.position, srcMesh.quaternion, srcMesh.scale);
                    geo.applyMatrix4(localMat);

                    const mat = srcMesh.material.clone();
                    mat.userData.uniforms = { windTime: { value: 0 } };
                    mat.onBeforeCompile = (shader) => {
                        shader.uniforms.windTime = mat.userData.uniforms.windTime;
                        shader.vertexShader = `
                            attribute float aWindPhase;
                            attribute float aWindStrength;
                            uniform float windTime;
                        ` + shader.vertexShader.replace(
                            '#include <begin_vertex>',
                            `#include <begin_vertex>
                            float wX = sin(windTime * 1.5 + aWindPhase) * aWindStrength;
                            float wZ = sin(windTime * 1.2 + aWindPhase * 0.7) * aWindStrength * 0.6;
                            transformed.x += transformed.y * wX;
                            transformed.z += transformed.y * wZ;`
                        );
                    };

                    const mesh = new THREE.InstancedMesh(geo, mat, idx);
                    mesh.castShadow = false;
                    mesh.receiveShadow = false;
                    mesh.frustumCulled = false;
                    for (let i = 0; i < idx; i++) mesh.setMatrixAt(i, matrices[i]);
                    mesh.instanceMatrix.needsUpdate = true;
                    geo.setAttribute('aWindPhase', new THREE.InstancedBufferAttribute(wpSlice.slice(), 1));
                    geo.setAttribute('aWindStrength', new THREE.InstancedBufferAttribute(wsSlice.slice(), 1));
                    scene.add(mesh);
                    _flowerInstancedMeshes.push(mesh);
                }
                console.log(`Instanced ${idx} flowers across ${srcMeshes.length} mesh parts`);
            }

            // === ROCKS (clones — fewer, different sizes at depth layers) ===
            // Corner rocks on the floor rectangle (parallax reference)
            placeClone(rockModel, -hw+0.2, 0, roomZ+0.2, 0.18, Math.random()*Math.PI);       // back-left
            placeClone(rockModel, hw-0.2, 0, roomZ+0.2, 0.25, Math.random()*Math.PI);         // back-right
            placeClone(rockModel, -hw+0.2, 0, roomZ+roomD-0.2, 0.3, Math.random()*Math.PI);   // front-left
            placeClone(rockModel, hw-0.2, 0, roomZ+roomD-0.2, 0.22, Math.random()*Math.PI);   // front-right
            // Near
            placeClone(rockModel, -hw-0.5, 0, capyZ-1, 0.25, Math.random()*Math.PI);
            placeClone(rockModel, hw+0.5, 0, capyZ+0.5, 0.2, Math.random()*Math.PI);
            // Mid
            for (const [x,z,s] of [
                [-5,roomZ-2,0.4],[4.5,roomZ-3,0.35],[-2,roomZ-5,0.5],
                [6,roomZ-4.5,0.3],[0,roomZ-1.5,0.2],[4.5,roomZ-1.5,0.15],[1.5,roomZ-2.5,0.18],
            ]) placeClone(rockModel, x, 0, z, s, Math.random()*Math.PI);
            // Far
            for (const [x,z,s] of [
                [-7,roomZ-10,0.8],[8,roomZ-8,0.7],[-3,roomZ-15,1.0],
                [5,roomZ-20,0.9],[-10,roomZ-25,1.2],
            ]) placeClone(rockModel, x, 0, z, s, Math.random()*Math.PI);

            // === GRASS (clones — scattered) ===
            for (const [x,z] of [
                [-hw-0.3,roomZ+1],[hw+0.3,roomZ+3],[-1,roomZ+roomD+0.3],[1,roomZ+roomD+0.3],
                [-4,roomZ-1],[5,roomZ-2],[-3,roomZ-4],[3,roomZ-5],[-6,roomZ+2],[6,roomZ+1],[0,roomZ-3],
            ]) placeClone(grassModel, x, 0.02, z, 0.3+Math.random()*0.2, Math.random()*Math.PI*2);
            for (let i = 0; i < 12; i++) {
                const x = (Math.random()-0.5)*25, z = roomZ - 3 - Math.random()*20;
                placeClone(grassModel, x, 0.02, z, 0.3+Math.random()*0.3, Math.random()*Math.PI*2);
            }

            console.log('Open landscape decorated');
        } catch (e) {
            console.warn('Decoration failed (non-critical):', e);
        }

        // Trees loaded separately so a failure doesn't kill decorations
        try {
            const [tree1Model, tree2Model] = await Promise.all([
                loadModel('models/tree1.glb'),
                loadModel('models/tree2.glb'),
            ]);
            for (const [x,z,s] of [
                [-8,roomZ-8,1.2],[-4,roomZ-12,1.5],[7,roomZ-9,1.0],
                [3,roomZ-14,1.8],[-10,roomZ-15,1.6],[10,roomZ-12,1.3],
                [-6,roomZ-20,2.0],[8,roomZ-18,1.7],[0,roomZ-22,2.2],
                [-12,roomZ-10,1.1],[12,roomZ-16,1.4],
                [-15,roomZ-30,1.5],[14,roomZ-28,1.3],[0,roomZ-35,2.0],
                [-8,roomZ-32,1.6],[10,roomZ-34,1.8],
            ]) {
                const model = Math.random() > 0.5 ? tree1Model : tree2Model;
                placeClone(model, x, 0, z, s, Math.random()*Math.PI*2);
            }
            console.log('Trees placed');
        } catch (e) {
            console.warn('Trees failed (non-critical):', e);
        }

        // ============================================================
        // HAT SYSTEM
        // ============================================================
        const hatModels = [];
        let currentHatIndex = -1; // -1 = no hat
        let currentHatMesh = null;
        let _currentHatCfg = null;
        let _hatsEnabled = true;
        const _hatFollowPos = new THREE.Vector3();
        const _hatFollowQuat = new THREE.Quaternion();
        const _hatOffset = new THREE.Vector3();
        const _hatCorrectionQuat = new THREE.Quaternion().setFromAxisAngle(
            new THREE.Vector3(1, 0, 0), -Math.PI / 2
        );

        function normalizeHatModel(hatScene, targetWidth = 0.6) {
            const box = new THREE.Box3().setFromObject(hatScene);
            const size = box.getSize(new THREE.Vector3());
            const maxHoriz = Math.max(size.x, size.z);
            if (maxHoriz > 0) hatScene.scale.setScalar(targetWidth / maxHoriz);
            const box2 = new THREE.Box3().setFromObject(hatScene);
            const center2 = box2.getCenter(new THREE.Vector3());
            hatScene.position.x -= center2.x;
            hatScene.position.z -= center2.z;
            hatScene.position.y -= box2.min.y;
            const wrapper = new THREE.Group();
            wrapper.add(hatScene);
            return wrapper;
        }

        // Load hats
        const hatFiles = [
            'models/hats/baseball.glb',
            'models/hats/graduation.glb',
            'models/hats/hardhat.glb',
            'models/hats/pirate.glb',
            'models/hats/tophat.glb',
            'models/hats/wizard.glb',
        ];
        totalModels += hatFiles.length;
        updateLoadBar();

        for (const hatPath of hatFiles) {
            try {
                const hatName = hatPath.split('/').pop().replace('.glb', '');
                loadText.textContent = `loading ${hatName}...`;
                const gltf = await new Promise((resolve, reject) => {
                    loader.load(hatPath, resolve, undefined, reject);
                });
                hatModels.push(normalizeHatModel(gltf.scene));
                loadedCount++;
                updateLoadBar();
            } catch (e) {
                console.warn(`Failed to load hat ${hatPath}:`, e);
                loadedCount++;
                updateLoadBar();
            }
        }

        // Per-hat placement offsets (world units)
        const hatConfigs = [
            { up: 0.50, fwd: 0.0 },   // baseball
            { up: 0.32, fwd: -0.06 },  // graduation
            { up: 0.57, fwd: 0.0 },    // hardhat
            { up: 0.28, fwd: 0.06 },   // pirate
            { up: 0.54, fwd: -0.08 },  // tophat
            { up: 0.58, fwd: -0.04 },  // wizard
        ];

        function cycleHat() {
            currentHatIndex++;
            if (currentHatIndex >= hatModels.length) currentHatIndex = -1;

            // Remove current hat
            if (currentHatMesh && currentHatMesh.parent) {
                currentHatMesh.parent.remove(currentHatMesh);
                currentHatMesh = null;
                _currentHatCfg = null;
            }

            // Add new hat
            if (currentHatIndex >= 0 && _capyHeadBone) {
                const hat = hatModels[currentHatIndex].clone();

                // Fix Poly Pizza materials
                hat.traverse(c => {
                    if (c.isMesh && c.material) {
                        if (c.material.emissiveMap && !c.material.map) {
                            c.material.map = c.material.emissiveMap;
                            c.material.emissive.setScalar(0);
                            c.material.emissiveMap = null;
                            c.material.needsUpdate = true;
                        }
                    }
                });

                const cfg = hatConfigs[currentHatIndex] || { up: 0.50, fwd: 0.14 };
                hat.scale.set(1, 1, 1);

                // Per-hat tweaks
                if (currentHatIndex === 0) { // baseball cap -> blue
                    hat.traverse(c => {
                        if (c.isMesh) {
                            c.material = c.material.clone();
                            c.material.color.setHex(0x1a3a8a);
                            c.material.needsUpdate = true;
                        }
                    });
                }
                if (currentHatIndex === 1) { // graduation
                    hat.children[0].rotation.y = Math.PI / 2;
                    hat.children[0].rotation.z = -Math.PI / 12;
                }
                if (currentHatIndex === 2) { // hardhat
                    hat.children[0].rotation.y = -Math.PI / 2;
                    hat.children[0].position.x += 0.04;
                }
                if (currentHatIndex === 3) { // pirate -> 40% bigger
                    hat.scale.set(1.40, 1.40, 1.40);
                    hat.children[0].position.x += 0.04;
                }
                if (currentHatIndex === 4) { // tophat -> 25% bigger
                    hat.scale.set(1.25, 1.25, 1.25);
                    hat.children[0].rotation.x = -Math.PI / 18;
                }
                if (currentHatIndex === 5) { // wizard -> 25% bigger
                    hat.scale.set(1.25, 1.25, 1.25);
                    hat.children[0].rotation.x = -7 * Math.PI / 180;
                }

                _currentHatCfg = cfg;
                scene.add(hat);
                currentHatMesh = hat;
            }
        }

        // ============================================================
        // PROPS (load after hats)
        // ============================================================
        const propManager = new PropManager({ scene, loader });
        propManager.setMathUtils(THREE.Vector3, THREE.Quaternion, THREE.Box3);

        if (_reactionsEnabled) {
            totalModels += propManager.totalCount;
            updateLoadBar();
            loadText.textContent = 'loading props...';
            await propManager.loadAll((name) => {
                loadedCount++;
                updateLoadBar();
                loadText.textContent = 'loading ' + name + '...';
            });
            propManager.setBones(_boneMap);
        }

        // ============================================================
        let _marketCap = null;

        // ============================================================
        // REACTION SYSTEM
        // ============================================================
        let reactionSystem = null;
        // Face tracker proxy — updated every frame in animate() with real tracking data
        const faceTrackerProxy = {
            isActive: false,
            isPresent: false,
            timeSinceLeft: 0,
            headPose: { x: 0, y: 0, z: 0, tiltX: 0, tiltY: 0 },
        };
        if (_reactionsEnabled && mixer && _animActions) {
            reactionSystem = new ReactionSystem({
                mixer,
                animActions: _animActions,
                faceTracker: faceTrackerProxy,
                propManager,
            });
            reactionSystem.onFlowerShockwave = () => { _cameraZoomPulse = 0.3; };
            reactionSystem.onVaporwaveFlash = () => { _vaporwaveFlash = 2.0; };
            reactionSystem.onScreenShake = () => { _screenShake = 0.8; };
            reactionSystem.onBoomboxWalk = () => { spawnBgCapybara(); };
        }

        // Background boombox capybara walk-through
        let _bgCapybara = null, _bgCapyMixer = null, _bgCapyActive = false;
        let _bgCapySpeed = 0, _bgCapyEndX = 0, _bgCapyGoRight = true;

        window._triggerBoomboxWalk = () => spawnBgCapybara();
        window._triggerAction = (name, dur) => reactionSystem?._triggerChaotic(name, dur || 5);
        window._showProp = (name) => propManager?.show(name);
        window._hideProp = (name) => propManager?.hide(name);
        async function spawnBgCapybara() {
            if (_bgCapyActive) return;

            const group = new THREE.Group();
            const goRight = false; // always right to left
            const startX = roomW * 2;
            const endX = -roomW * 2;

            group.position.set(startX, -0.05, roomZ + roomD * 0.15);

            // Load fresh GLB (SkinnedMesh.clone() loses bone bindings)
            const bgGltf = await new Promise((res, rej) => loader.load('models/capybara-biped-animations.glb', res, undefined, rej));
            const bgCapy = bgGltf.scene;
            bgCapy.scale.setScalar(scaleFactor * 0.8);
            bgCapy.rotation.y = goRight ? Math.PI / 2 : -Math.PI / 2;
            bgCapy.traverse(c => {
                if (c.isMesh && c.material) {
                    c.material = c.material.clone();
                    if (c.material.emissiveMap && !c.material.map) c.material.map = c.material.emissiveMap;
                    if (c.material.emissive) c.material.emissive.set(0, 0, 0);
                    c.material.emissiveIntensity = 0;
                    c.material.emissiveMap = null;
                    c.material.metalness = 0;
                    c.material.roughness = 0.8;
                    c.material.needsUpdate = true;
                }
            });
            group.add(bgCapy);

            // Load fresh boombox and attach to RightShoulder bone
            let bgShoulder = null;
            bgCapy.traverse(c => { if (c.isBone && c.name === 'RightShoulder') bgShoulder = c; });
            if (bgShoulder) {
                try {
                    const bmGltf = await new Promise((res, rej) => loader.load('models/props/boombox.glb', res, undefined, rej));
                    const bmModel = bmGltf.scene;
                    // Bone is in original model space (huge), counter-scale:
                    // bgCapy scaled by scaleFactor*0.8, so bone space is 1/(scaleFactor*0.8) bigger than world
                    bmModel.scale.setScalar(350);
                    bmModel.position.set(0, 30, -80);
                    bmModel.rotation.set(Math.PI / 2, -Math.PI, Math.PI);
                    bmModel.traverse(c => {
                        if (c.isMesh && c.material) {
                            c.material = c.material.clone();
                            if (c.material.emissiveMap && !c.material.map) c.material.map = c.material.emissiveMap;
                            if (c.material.emissive) c.material.emissive.set(0, 0, 0);
                            c.material.emissiveIntensity = 0;
                            c.material.emissiveMap = null;
                            c.material.needsUpdate = true;
                        }
                    });
                    bgShoulder.add(bmModel);
                } catch (e) { console.warn('Boombox load failed:', e); }
            }

            scene.add(group);
            _bgCapybara = group;
            _bgCapyActive = true;
            _bgCapySpeed = (endX - startX) / 12;
            _bgCapyEndX = endX;
            _bgCapyGoRight = goRight;

            // Animation — mixer on group (same pattern as main capybara)
            _bgCapyMixer = new THREE.AnimationMixer(group);
            const runClip = bgGltf.animations.find(a => a.name === 'Running');
            if (runClip) {
                _bgCapyMixer.clipAction(runClip).play();
            }
        }

        function updateBgCapybara(delta) {
            if (!_bgCapyActive || !_bgCapybara) return;
            _bgCapybara.position.x += _bgCapySpeed * delta;
            if (_bgCapyMixer) _bgCapyMixer.update(delta);
            const done = _bgCapyGoRight
                ? _bgCapybara.position.x > _bgCapyEndX
                : _bgCapybara.position.x < _bgCapyEndX;
            if (done) {
                scene.remove(_bgCapybara);
                _bgCapybara = null;
                _bgCapyActive = false;
                _bgCapyMixer = null;
            }
        }

        // ============================================================
        // MARKET CAP SPEECH BUBBLE
        // ============================================================
        let _mcapBubble = null;
        let _mcapBubbleMat = null;
        let _mcapBubbleCanvas = null;
        const _bubbleCamRight = new THREE.Vector3();
        const _bubbleCamFwd = new THREE.Vector3();
        const _bubbleHeadPos = new THREE.Vector3();

        function formatMcap(v) {
            if (v == null) return '...';
            if (v >= 1_000_000_000) return `$${(v / 1_000_000_000).toFixed(2)}B`;
            if (v >= 1_000_000)     return `$${(v / 1_000_000).toFixed(2)}M`;
            if (v >= 1_000)         return `$${(v / 1_000).toFixed(1)}K`;
            return `$${Math.round(v)}`;
        }

        function drawBubble(text) {
            if (!_mcapBubbleCanvas) return;
            const W = _mcapBubbleCanvas.width, H = _mcapBubbleCanvas.height;
            const ctx = _mcapBubbleCanvas.getContext('2d');
            ctx.clearRect(0, 0, W, H);
            const bH = H * 0.72, bW = W * 0.88, bX = (W - bW) / 2, bY = 4;
            const r = 18;
            ctx.beginPath();
            ctx.moveTo(bX + r, bY);
            ctx.lineTo(bX + bW - r, bY);
            ctx.quadraticCurveTo(bX + bW, bY, bX + bW, bY + r);
            ctx.lineTo(bX + bW, bY + bH - r);
            ctx.quadraticCurveTo(bX + bW, bY + bH, bX + bW - r, bY + bH);
            ctx.lineTo(bX + bW * 0.86, bY + bH);
            ctx.lineTo(W - 14, H - 2);
            ctx.lineTo(bX + bW * 0.68, bY + bH);
            ctx.lineTo(bX + r, bY + bH);
            ctx.quadraticCurveTo(bX, bY + bH, bX, bY + bH - r);
            ctx.lineTo(bX, bY + r);
            ctx.quadraticCurveTo(bX, bY, bX + r, bY);
            ctx.closePath();

            const gold = _marketCap != null && _marketCap >= 1_000_000;

            ctx.fillStyle = gold ? 'rgba(40, 28, 5, 0.88)' : 'rgba(15, 20, 30, 0.82)';
            ctx.fill();
            ctx.strokeStyle = gold ? 'rgba(255, 200, 60, 0.8)' : 'rgba(255, 255, 255, 0.35)';
            ctx.lineWidth = gold ? 2.5 : 2;
            ctx.stroke();

            ctx.fillStyle = gold ? 'rgba(255, 200, 80, 0.85)' : 'rgba(180, 200, 220, 0.7)';
            ctx.font = '500 17px Quicksand, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('$CAPYSIM', W / 2, bY + bH * 0.25);

            ctx.fillStyle = gold ? '#ffd84d' : '#ffffff';
            ctx.font = '500 28px Quicksand, sans-serif';
            ctx.fillText(text, W / 2, bY + bH * 0.55);

            ctx.fillStyle = gold ? 'rgba(255, 190, 60, 0.55)' : 'rgba(180, 200, 220, 0.5)';
            ctx.font = '500 13px Quicksand, sans-serif';
            ctx.fillText('mcap', W / 2, bY + bH * 0.82);

            if (_mcapBubbleMat) _mcapBubbleMat.map.needsUpdate = true;
        }

        // Create bubble
        {
            const W = 256, H = 140;
            const canvas = document.createElement('canvas');
            canvas.width = W; canvas.height = H;
            _mcapBubbleCanvas = canvas;
            const tex = new THREE.CanvasTexture(canvas);
            const mat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, depthWrite: false, side: THREE.DoubleSide });
            const mesh = new THREE.Mesh(new THREE.PlaneGeometry(1.3, 0.71), mat);
            mesh.position.set(0, 1.5, 0);
            mesh.visible = false;
            scene.add(mesh);
            _mcapBubble = mesh;
            _mcapBubbleMat = mat;
            drawBubble('...');
        }

        // ============================================================
        // RAIN / WEATHER SYSTEM
        // ============================================================
        let _weatherT = 0, _weatherTarget = 0;
        const _weatherSpeed = 0.3;
        let _rainAudio = null;
        let _muted = false;
        let _savedVolume = 0.3;

        // Sunny baseline colors for the diorama walls -- used for rain lerp
        // We apply weather to the diorama lighting only (not wall shaders, which stay fixed)
        const _sunnyHemiSky = new THREE.Color(0xd4e8f0);
        const _rainyHemiSky = new THREE.Color(0x707878);

        // Rain particle system
        const rainCount = _isMobile ? 1500 : 3000;
        const rainSpeeds = new Float32Array(rainCount);
        const rainSeedsY = new Float32Array(rainCount);
        const rainXZOffsets = new Float32Array(rainCount * 2);
        for (let i = 0; i < rainCount; i++) {
            rainSpeeds[i] = 8 + Math.random() * 6;
            rainSeedsY[i] = Math.random();
            rainXZOffsets[i * 2] = (Math.random() - 0.5) * 50;
            rainXZOffsets[i * 2 + 1] = (Math.random() - 0.5) * 50;
        }
        const rainGeo = new THREE.BufferGeometry();
        const rainDummyPos = new Float32Array(rainCount * 3);
        rainGeo.setAttribute('position', new THREE.BufferAttribute(rainDummyPos, 3));
        rainGeo.setAttribute('aSpeed', new THREE.BufferAttribute(rainSpeeds, 1));
        rainGeo.setAttribute('aSeedY', new THREE.BufferAttribute(rainSeedsY, 1));
        rainGeo.setAttribute('aXZOffset', new THREE.BufferAttribute(rainXZOffsets, 2));

        // Raindrop sprite texture
        const rainCanvas = document.createElement('canvas');
        rainCanvas.width = 8; rainCanvas.height = 128;
        const rainCtx = rainCanvas.getContext('2d');
        rainCtx.clearRect(0, 0, 8, 128);
        const rainGrad = rainCtx.createLinearGradient(0, 0, 0, 128);
        rainGrad.addColorStop(0, 'rgba(200,215,230,0)');
        rainGrad.addColorStop(0.1, 'rgba(220,235,250,0.4)');
        rainGrad.addColorStop(0.4, 'rgba(255,255,255,0.9)');
        rainGrad.addColorStop(0.9, 'rgba(200,215,230,0.3)');
        rainGrad.addColorStop(1, 'rgba(200,215,230,0)');
        rainCtx.fillStyle = rainGrad;
        rainCtx.fillRect(3, 0, 2, 128);
        const rainTex = new THREE.CanvasTexture(rainCanvas);

        const _rainUniforms = {
            time: { value: 0 },
            camPos: { value: new THREE.Vector3() },
            opacity: { value: 0 },
            map: { value: rainTex },
        };
        const rainMat = new THREE.ShaderMaterial({
            uniforms: _rainUniforms,
            vertexShader: `
                attribute float aSpeed;
                attribute float aSeedY;
                attribute vec2  aXZOffset;
                uniform float time;
                uniform vec3  camPos;
                uniform float opacity;
                varying float vAlpha;
                void main() {
                    float y = mod(aSeedY * 26.0 - time * aSpeed, 27.0) - 2.0;
                    vec3 wp = vec3(camPos.x + aXZOffset.x, y, camPos.z + aXZOffset.y);
                    vec4 mvPos = viewMatrix * vec4(wp, 1.0);
                    gl_Position  = projectionMatrix * mvPos;
                    gl_PointSize = 600.0 / -mvPos.z;
                    vAlpha = opacity;
                }
            `,
            fragmentShader: `
                uniform sampler2D map;
                varying float vAlpha;
                void main() {
                    vec4 t = texture2D(map, gl_PointCoord);
                    if (t.a < 0.01) discard;
                    gl_FragColor = vec4(t.rgb, t.a * vAlpha);
                }
            `,
            transparent: true,
            depthWrite: false,
            blending: THREE.AdditiveBlending,
        });
        const _rainParticles = new THREE.Points(rainGeo, rainMat);
        _rainParticles.frustumCulled = false;
        scene.add(_rainParticles);

        // Rain + thunder audio
        _rainAudio = new Audio('audio/rain_01.mp3');
        _rainAudio.loop = true;
        _rainAudio.volume = 0;

        let _rainUserVol = 0.4;

        function toggleRain() {
            const goingRainy = _weatherTarget === 0;
            _weatherTarget = goingRainy ? 1 : 0;
            if (goingRainy) _rainAudio.play().catch(() => {});
            document.getElementById('btn-rain').classList.toggle('active', goingRainy);
            if (reactionSystem) reactionSystem.onRainToggle();
        }

        function updateWeather(delta, time) {
            if (_weatherT < _weatherTarget) {
                _weatherT = Math.min(_weatherT + _weatherSpeed * delta, 1);
            } else if (_weatherT > _weatherTarget) {
                _weatherT = Math.max(_weatherT - _weatherSpeed * delta, 0);
            }
            const t = _weatherT;

            // Rain GPU shader uniforms
            _rainUniforms.time.value = time;
            _rainUniforms.camPos.value.copy(camera.position);
            _rainUniforms.opacity.value = t * 0.8;

            // Lighting lerps for diorama
            sun.intensity = 1.2 - t * 0.9;
            hemiLight.color.lerpColors(_sunnyHemiSky, _rainyHemiSky, t);
            ambientLight.intensity = 0.4 + t * 0.15;

            // Rain audio
            if (_rainAudio) {
                _rainAudio.volume = _muted ? 0 : t * _rainUserVol;
                if (t === 0 && !_rainAudio.paused) _rainAudio.pause();
            }
        }


        // ============================================================
        // LOFI MUSIC
        // ============================================================
        const tracks = [
            'audio/lofi_loop_01.mp3', 'audio/lofi_loop_02.mp3', 'audio/lofi_loop_03.mp3',
            'audio/lofi_loop_04.mp3', 'audio/lofi_loop_05.mp3', 'audio/lofi_loop_06.mp3',
            'audio/lofi_loop_07.mp3', 'audio/lofi_loop_08.mp3', 'audio/lofi_loop_09.mp3',
        ];
        let currentTrack = Math.floor(Math.random() * tracks.length);
        let audio = new Audio(tracks[currentTrack]);
        audio.volume = 0.3;
        audio.preload = 'auto'; // preload so it's ready on tap

        function onTrackEnd() {
            currentTrack = (currentTrack + 1) % tracks.length;
            const vol = audio.volume;
            audio = new Audio(tracks[currentTrack]);
            audio.volume = vol;
            audio.addEventListener('ended', onTrackEnd);
            audio.play().catch(() => {});
        }
        audio.addEventListener('ended', onTrackEnd);

        // Skip button
        document.getElementById('btn-skip').addEventListener('click', (e) => {
            e.stopPropagation();
            currentTrack = (currentTrack + 1) % tracks.length;
            const wasPlaying = !audio.paused;
            const vol = audio.volume;
            audio.pause();
            audio = new Audio(tracks[currentTrack]);
            audio.volume = vol;
            audio.addEventListener('ended', onTrackEnd);
            if (wasPlaying) audio.play().catch(() => {});
            if (reactionSystem) reactionSystem.onMusicSkip();
        });

        // Mute toggle
        _savedVolume = audio.volume;
        document.getElementById('btn-mute').addEventListener('click', (e) => {
            e.stopPropagation();
            _muted = !_muted;
            if (_muted) {
                _savedVolume = audio.volume;
                audio.volume = 0;
                if (_rainAudio) _rainAudio.volume = 0;
            } else {
                audio.volume = _savedVolume;
            }
            document.getElementById('btn-mute').innerHTML = _muted
                ? '<svg viewBox="0 0 24 24"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>'
                : '<svg viewBox="0 0 24 24"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/><path d="M15.54 8.46a5 5 0 010 7.07"/><path d="M19.07 4.93a10 10 0 010 14.14"/></svg>';
        });

        // Rain toggle button
        document.getElementById('btn-rain').addEventListener('click', (e) => {
            e.stopPropagation();
            toggleRain();
        });

        // ============================================================
        // POINTS / VIBES
        // ============================================================
        let score = 0;
        const scoreEl = document.getElementById('score');
        let playfun = null;

        const isCapture = new URLSearchParams(window.location.search).has('capture');
        try {
            if (isCapture) throw 'capture mode';
            playfun = new OpenGameSDK({
                gameId: 'f973fbb5-80b3-4ea6-a177-878eea9dbcfd',
                ui: { usePointsWidget: true },
            });
            await playfun.init();
            playfun.on('OnReady', () => console.log('Play.fun SDK ready'));
            playfun.on('error', (e) => console.warn('Play.fun error:', e));
            console.log('Play.fun SDK initialized');
        } catch (e) {
            console.warn('Play.fun SDK not available:', e);
            playfun = null;
        }

        // 1 point every 10 seconds
        setInterval(() => {
            score++;
            scoreEl.textContent = score;
            if (playfun) playfun.addPoints(1);
        }, 10000);

        // Save points every 2 minutes
        setInterval(() => {
            if (playfun) playfun.savePoints();
        }, 120000);

        window.addEventListener('beforeunload', () => {
            if (playfun) playfun.savePoints();
        });

        // ============================================================
        // MARKET CAP WEBSOCKET
        // ============================================================
        {
            const MINT = 'LWPihkg8SWDiAzG5TXAsgQuJeSZ3cXem1VStNX8PLAY';
            const THROTTLE_MS = 5 * 60 * 1000;
            let lastUpdate = 0;
            let _testLock = false;

            try {
                const socket = io('wss://ws.play.fun/realtime', {
                    transports: ['websocket'],
                    reconnection: true,
                    reconnectionDelay: 1000,
                    reconnectionDelayMax: 5000,
                    reconnectionAttempts: Infinity,
                });
                socket.on('connect', () => {
                    console.log('[mcap] connected:', socket.id);
                    socket.emit('join-mint', MINT);
                });
                socket.on('disconnect', (reason) => console.warn('[mcap] disconnected:', reason));
                socket.on('connect_error', (err) => console.warn('[mcap] connection error:', err.message));
                socket.on('token-updates', (batch) => {
                    if (_testLock) return;
                    const now = Date.now();
                    const doVisualUpdate = lastUpdate === 0 || now - lastUpdate >= THROTTLE_MS;
                    for (const u of batch.updates) {
                        if (u.mint !== MINT) continue;
                        _marketCap = u.marketCap;
                        if (doVisualUpdate) {
                            lastUpdate = now;
                            drawBubble(formatMcap(_marketCap));
                        }
                    }
                });
                window.addEventListener('beforeunload', () => {
                    socket.emit('leave-mint', MINT);
                    socket.disconnect();
                });
            } catch (e) {
                console.warn('[mcap] WebSocket setup failed:', e);
            }
        }

        // ============================================================
        // HIDE LOADING, SHOW HUD
        // ============================================================
        document.getElementById('loading').style.display = 'none';
        document.getElementById('hud').style.display = 'flex';

        // ============================================================
        // OFF-AXIS PROJECTION -- THE DIORAMA EFFECT
        // ============================================================
        // Uses THREE.CameraUtils.frameCorners() -- the battle-tested
        // Three.js utility for off-axis projection.
        //
        // Define the screen rectangle (room opening) as 3 corner points.
        // The camera position = viewer eye position.
        // frameCorners() computes the correct asymmetric frustum
        // so the scene looks like it's behind a physical window.

        // Screen rectangle = the room opening (z = roomZ + roomD)
        const screenZ = roomZ + roomD;

        // 3 corners of the screen rectangle in world space
        const bottomLeftCorner  = new THREE.Vector3(-roomW / 2, 0,     screenZ);
        const bottomRightCorner = new THREE.Vector3( roomW / 2, 0,     screenZ);
        const topLeftCorner     = new THREE.Vector3(-roomW / 2, roomH, screenZ);

        // Base camera position (center of screen, camDist in front)
        const baseCamX = 0;
        const baseCamY = roomH / 2;
        const baseCamZ = screenZ + camDist;

        // Eye input (normalized -1 to 1)
        let eyeInputX = 0, eyeInputY = 0, eyeInputZ = 0;
        let _lastFaceSeenTime = 0;
        let _baseZ = null; // baseline Z from first face detection — your normal sitting distance
        let smoothX = 0, smoothY = 0;
        const smoothing = 0.25; // reference uses 0.3, fast response without jitter

        // === FACE TRACKING (primary on all devices) ===
        let faceTrackingActive = false;
        let faceVideo = null;
        let faceMesh = null;

        let faceError = '';

        // Pre-load MediaPipe: use inline module script to import and expose on window
        const mpScript = document.createElement('script');
        mpScript.type = 'module';
        mpScript.textContent = `
            import { FilesetResolver, FaceLandmarker } from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.33/vision_bundle.mjs';
            window.__MP_FilesetResolver = FilesetResolver;
            window.__MP_FaceLandmarker = FaceLandmarker;
            window.dispatchEvent(new Event('mediapipe-ready'));
        `;
        document.head.appendChild(mpScript);

        async function startFaceTracking() {
            try {
                faceError = 'getting camera...';

                // Step 1: Get camera FIRST (needs user gesture on iOS)
                faceVideo = document.createElement('video');
                faceVideo.setAttribute('playsinline', '');
                faceVideo.setAttribute('autoplay', '');
                faceVideo.style.display = 'none';
                document.body.appendChild(faceVideo);

                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: { ideal: 320 }, height: { ideal: 240 } },
                });
                faceVideo.srcObject = stream;
                await faceVideo.play();
                faceError = 'camera OK, waiting for AI lib...';

                // Step 2: Wait for MediaPipe module to load
                await new Promise((resolve, reject) => {
                    if (window.__MP_FilesetResolver) { resolve(); return; }
                    window.addEventListener('mediapipe-ready', resolve, { once: true });
                    setTimeout(() => reject(new Error('MediaPipe load timeout (15s)')), 15000);
                });

                if (!window.__MP_FilesetResolver || !window.__MP_FaceLandmarker) {
                    throw new Error('MediaPipe globals not found');
                }

                faceError = 'AI loaded, init model...';

                const filesetResolver = await window.__MP_FilesetResolver.forVisionTasks(
                    'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.33/wasm'
                );
                faceMesh = await window.__MP_FaceLandmarker.createFromOptions(filesetResolver, {
                    baseOptions: {
                        modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task',
                        delegate: 'GPU',
                    },
                    runningMode: 'VIDEO',
                    numFaces: 1,
                    outputFaceBlendshapes: false,
                    outputFacialTransformationMatrixes: true,
                });

                faceTrackingActive = true;
                faceError = 'RUNNING';
            } catch (e) {
                faceError = 'FAIL: ' + (e.message || e);
                console.warn('[face] failed:', e);
            }
        }

        // Track whether face is actually being detected right now
        let faceDetected = false;

        function updateFaceTracking() {
            if (!faceTrackingActive || !faceVideo || faceVideo.readyState < 2 || !faceMesh) return;
            const results = faceMesh.detectForVideo(faceVideo, performance.now());
            if (results.facialTransformationMatrixes && results.facialTransformationMatrixes.length > 0) {
                const mat = results.facialTransformationMatrixes[0].data;
                // Reference uses inverted axes with 1.5x scale
                // mat[12]=tx (positive=right), mat[13]=ty (positive=up)
                // Don't clamp hard -- let values exceed 1 for more range
                eyeInputX = -mat[12] / 10;
                eyeInputY = mat[13] / 6;
                // Z calibration: use RELATIVE distance from starting position
                // First frame with face sets the baseline
                const rawZ = mat[14];
                // Calibrate Z only ONCE — first ever detection
                if (_baseZ === null) _baseZ = rawZ;
                // How much closer than baseline (positive = closer)
                // rawZ gets LESS negative when closer, so rawZ - _baseZ is positive when leaning in
                // Pass raw difference: negative = closer, positive = farther
                eyeInputZ = (rawZ - _baseZ) / 10;
                faceDetected = true;
                _lastFaceSeenTime = performance.now() / 1000;
            } else {
                faceDetected = false;
            }
        }

        // === MOUSE (desktop fallback) ===
        window.addEventListener('mousemove', (e) => {
            if (faceDetected) return;
            eyeInputX = (e.clientX / window.innerWidth - 0.5) * 2;
            eyeInputY = -(e.clientY / window.innerHeight - 0.5) * 2;
        });

        // Start tracking + music on first tap
        let _musicStarted = false;
        const startOnTap = () => {
            document.removeEventListener('touchstart', startOnTap);
            document.removeEventListener('click', startOnTap);

            // Start music FIRST (needs user gesture, must be before any async)
            if (!_musicStarted) {
                _musicStarted = true;
                audio.play().catch(e => console.warn('Music:', e));
                if (reactionSystem) reactionSystem._musicPlaying = true;
            }

            // Then start face tracking (async, won't block audio)
            startFaceTracking();
        };
        document.addEventListener('touchstart', startOnTap, { once: true });
        document.addEventListener('click', startOnTap, { once: true });

        // On desktop, start face tracking immediately
        if (!_isMobile) {
            startFaceTracking();
        }

        // Try to auto-play music (will usually fail without gesture)
        audio.play().catch(() => {});


        // VFX state
        let _vaporwaveFlash = 0;
        let _screenShake = 0;
        let _cameraZoomPulse = 0;

        // Vaporwave flash targets (no walls anymore — flash scene bg + fog + ground)
        const _origBgColor = new THREE.Color(0x9ac8e8);
        const _origFogColor = new THREE.Color(0x9ac8e8);

        // === RENDER LOOP ===
        const clock = new THREE.Clock();
        const _debugEl = document.getElementById('zdbg');

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.elapsedTime;

            // Update animations
            if (mixer) mixer.update(delta);

            // GPU wind for instanced flowers
            for (const fm of _flowerInstancedMeshes) {
                fm.material.userData.uniforms.windTime.value = time;
            }

            // Update face tracker proxy with real data for reaction system
            faceTrackerProxy.isActive = faceTrackingActive;
            faceTrackerProxy.isPresent = faceDetected;
            faceTrackerProxy.headPose.x = eyeInputX;
            faceTrackerProxy.headPose.y = eyeInputY;
            faceTrackerProxy.headPose.z = eyeInputZ;
            faceTrackerProxy.timeSinceLeft = faceDetected ? 0 : (performance.now() / 1000 - _lastFaceSeenTime);

            // Update reaction system
            if (reactionSystem) reactionSystem.update(delta);
            updateBgCapybara(delta);

            // Panic run — move capybara toward camera
            if (reactionSystem?.isPanicRunning) {
                capyGroup.position.z += delta * 0.75;
            } else {
                // Lerp back to home position
                const homeZ = roomZ + roomD * 0.55;
                capyGroup.position.z += (homeZ - capyGroup.position.z) * 0.05;
            }

            // Update props
            if (propManager) propManager.update(delta);

            // Update face tracking
            updateFaceTracking();

            // Smooth eye input
            smoothX += (eyeInputX - smoothX) * smoothing;
            smoothY += (eyeInputY - smoothY) * smoothing;

            // Camera position = eye position
            const moveRangeX = roomW * 0.2;
            const moveRangeY = roomH * 0.25;
            let camPosX = baseCamX + smoothX * moveRangeX;
            let camPosY = baseCamY + smoothY * moveRangeY;
            let camPosZ = baseCamZ;

            // Screen shake VFX
            if (_screenShake > 0) {
                _screenShake -= delta;
                camPosX += (Math.random() - 0.5) * 0.15;
                camPosY += (Math.random() - 0.5) * 0.10;
            }

            // Camera zoom pulse VFX (replaces flower shockwave)
            if (_cameraZoomPulse > 0) {
                _cameraZoomPulse -= delta;
                camPosZ -= Math.sin(_cameraZoomPulse * 10) * 0.3;
            }

            camera.position.set(camPosX, camPosY, camPosZ);

            // frameCorners computes the correct off-axis projection matrix
            frameCorners(camera, bottomLeftCorner, bottomRightCorner, topLeftCorner, false);

            // Vaporwave flash VFX — flash scene background + fog
            if (_vaporwaveFlash > 0) {
                _vaporwaveFlash -= delta;
                const purple = new THREE.Color(0x8B5CF6);
                scene.background.copy(purple);
                scene.fog.color.copy(purple);
            } else if (_vaporwaveFlash <= 0 && _vaporwaveFlash > -1) {
                _vaporwaveFlash = -1;
                scene.background.copy(_origBgColor);
                scene.fog.color.copy(_origFogColor);
            }

            // Hat follows head bone
            if (currentHatMesh && _capyHeadBone && _currentHatCfg) {
                _capyHeadBone.getWorldPosition(_hatFollowPos);
                _capyHeadBone.getWorldQuaternion(_hatFollowQuat);
                const cfg = _currentHatCfg;
                _hatOffset.set(0, cfg.fwd, -cfg.up);
                _hatOffset.applyQuaternion(_hatFollowQuat);
                currentHatMesh.position.copy(_hatFollowPos).add(_hatOffset);
                currentHatMesh.quaternion.copy(_hatFollowQuat).multiply(_hatCorrectionQuat);
            }

            // Mcap bubble follows head bone
            if (_mcapBubble) {
                const bubbleBone = _capyHeadBone;
                if (bubbleBone) {
                    bubbleBone.getWorldPosition(_bubbleHeadPos);
                    _bubbleCamRight.setFromMatrixColumn(camera.matrixWorld, 0);
                    _bubbleCamFwd.setFromMatrixColumn(camera.matrixWorld, 2);
                    _mcapBubble.position.copy(_bubbleHeadPos)
                        .addScaledVector(_bubbleCamRight, -1.1)
                        .addScaledVector(_bubbleCamFwd, 0.7);
                    _mcapBubble.position.y += 0.65;
                    _mcapBubble.lookAt(camera.position);
                }
            }

            // Weather transitions
            updateWeather(delta, time);

            // Standing FX (runs AFTER weather so lighting values override rain when active)

            // Debug overlay
            if (faceDetected) {
                _debugEl.textContent =
                    'Z: ' + eyeInputZ.toFixed(2) + (eyeInputZ > 0.5 ? ' CLOSE' : '') + '\n' +
                    'X: ' + eyeInputX.toFixed(2) + '  Y: ' + eyeInputY.toFixed(2) + '\n' +
                    'state: ' + (reactionSystem ? reactionSystem._currentAnim : 'none');
            } else {
                _debugEl.textContent = 'face: NOT DETECTED\ntimeSince: ' + faceTrackerProxy.timeSinceLeft.toFixed(1) + 's';
            }

            renderer.render(scene, camera);
        }

        animate();

        // === RESIZE ===
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
